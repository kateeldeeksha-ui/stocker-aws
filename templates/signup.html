<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sign Up – Stocker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">📈</div>
    <h2>Create Account</h2>
    <p class="auth-sub">Join Stocker and start trading</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('signup') }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required placeholder="johndoe"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Min 8 characters"/>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select name="role">
          <option value="trader">Trader</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn-primary full">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</body>
</html>
